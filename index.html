<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiawei Wang · Photography</title>
  <meta name="description" content="Photography by Jiawei Wang — landscape and people." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Nav -->
  <header class="nav">
    <a href="#top" class="brand">
      <span class="brand-name">JIAWEI WANG</span>
      <span class="brand-tag">PHOTOGRAPHER</span>
    </a>
    <nav>
      <a href="#gallery">Portfolio</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Hero -->
  <section id="top" class="hero">
    <div class="hero-inner">
      <h1>Moments frozen in time.</h1>
      <a class="cta" href="#gallery">View Work ↓</a>
    </div>
  </section>

  <!-- Gallery -->
  <section id="gallery" class="gallery-section">
    <div class="section-head">
      <h2>Portfolio</h2>
      <div class="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="landscape">Landscape</button>
        <button class="filter" data-filter="people">People</button>
      </div>
    </div>

    <div class="grid" id="grid">
      <!-- Photos injected by script.js -->
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="contact">
    <h2>Get in touch</h2>
    <p><a href="mailto:etherealaddr@gmail.com">etherealaddr@gmail.com</a></p>
  </section>

  <footer>
    <small>© 2026 Jiawei Wang</small>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lb-close" aria-label="Close">×</button>
    <button class="lb-prev" aria-label="Previous">‹</button>
    <img id="lb-img" alt="" />
    <button class="lb-next" aria-label="Next">›</button>
    <div class="lb-caption" id="lb-caption"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
